<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <style>
        :root {
    		--primary-color: #28a745; 
    		--bg-color: #1e1e1e;     
    		--card-bg: #2d2d2d;     
    		--text-color: #ffffff;  
	}
	.result {
    		background: #3e3e3e #333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simple Interest Calculator</h2>
    <div class="input-group">
        <label for="principal">Principal (P):</label>
        <input type="number" id="principal" placeholder="Enter principal amount" required>
    </div>
    <div class="input-group">
        <label for="rate">Rate of Interest (R %):</label>
        <input type="number" step="0.01" id="rate" placeholder="Enter annual interest rate" required>
    </div>
    <div class="input-group">
        <label for="time">Time (N in Years):</label>
        <input type="number" step="0.1" id="time" placeholder="Enter time in years" required>
    </div>
    <button onclick="calculateSI()">Calculate</button>
    <div class="result" id="resultBox"></div>
</div>

<script>
    function calculateSI() {
        const P = parseFloat(document.getElementById('principal').value);
        const R = parseFloat(document.getElementById('rate').value);
        const N = parseFloat(document.getElementById('time').value);

        if (isNaN(P) || isNaN(R) || isNaN(N) || P <= 0 || R <= 0 || N <= 0) {
            alert("Please enter valid positive numbers.");
            return;
        }

        // SI = (P * R * N) / 100
        const si = (P * R * N) / 100;
        const total = P + si;

        const resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = `Interest (SI): $${si.toFixed(2)}<br>Total Amount: $${total.toFixed(2)}`;
        resultBox.style.display = 'block';
    }
</script>
</body>
</html>
