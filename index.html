<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <h2 class="text-2xl font-bold text-slate-800 text-center mb-6">Simple Interest Calculator</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">Principal Amount (P)</label>
                <input type="number" id="principal" placeholder="Enter principal amount" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">Rate of Interest (R) %</label>
                <input type="number" step="0.01" id="rate" placeholder="Enter annual interest rate" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">Time Period (N) in Years</label>
                <input type="number" step="0.1" id="time" placeholder="Enter number of years" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="calculateInterest()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition">
                Calculate SI
            </button>
        </div>
        <div id="result-box" class="mt-6 p-4 bg-slate-50 rounded-xl hidden border border-slate-100">
            <p class="text-sm text-slate-500">Calculated Simple Interest:</p>
            <p class="text-3xl font-extrabold text-blue-600 mt-1">₹<span id="si-value">0.00</span></p>
            <p class="text-xs text-slate-400 mt-2">Total Payable Amount: ₹<span id="total-value">0.00</span></p>
        </div>
    </div>
    <script>
        function calculateInterest() {
            const P = parseFloat(document.getElementById('principal').value);
            const R = parseFloat(document.getElementById('rate').value);
            const N = parseFloat(document.getElementById('time').value);
            if (isNaN(P) || isNaN(R) || isNaN(N) || P <= 0 || R <= 0 || N <= 0) {
                alert("Please enter valid positive numbers for all fields.");
                return;
            }
            const SI = (P * R * N) / 100;
            const total = P + SI;
            document.getElementById('si-value').innerText = SI.toFixed(2);
            document.getElementById('total-value').innerText = total.toFixed(2);
            document.getElementById('result-box').classList.remove('hidden');
        }
    </script>
</body>
</html>
